name: Submit Code

on:
  push:
    paths:
      - 'answers/*.cpp'
    branches:
      - main

jobs:
  trigger-judge:
    runs-on: ubuntu-latest
    steps:
      - name: リーダーボードに合図(Workflow Dispatch)を送信
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh workflow run remote-judge.yml \
            --repo KureRoboCoder/c-leaderboard \
            -f user="${{ github.actor }}" \
            -f repo="${{ github.repository }}" \
            -f sha="${{ github.sha }}"