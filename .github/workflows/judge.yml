name: Submit Code

on:
  push:
    paths:
      - 'answers/*.cpp' # answersフォルダの.cppが更新された時だけ起動
    branches:
      - main

jobs:
  trigger-judge:
    runs-on: ubuntu-latest
    steps:
      - name: リーダーボードに合図(Webhook)を送信
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: KureRoboCoder/c-leaderboard
          event-type: submit
          client-payload: '{"user": "${{ github.actor }}", "repo": "${{ github.repository }}", "sha": "${{ github.sha }}"}'